apiVersion: apps/v1
kind: Deployment
metadata: { name: honeytrace, labels: { app: honeytrace } }
spec:
  replicas: 1
  selector: { matchLabels: { app: honeytrace } }
  template:
    metadata: { labels: { app: honeytrace } }
    spec:
      containers:
        - name: honeytrace
          image: ghcr.io/cognis-digital/honeytrace:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: honeytrace }
spec:
  selector: { app: honeytrace }
  ports: [{ port: 80, targetPort: 8000 }]
